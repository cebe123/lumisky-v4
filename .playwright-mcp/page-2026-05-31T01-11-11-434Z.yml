          - textbox [ref=e157]: "precision mediump float; varying vec2 v_TexCoord; uniform vec2 u_Resolution; uniform float u_Time; uniform float u_TimeOfDay; // 0 to 24 uniform vec2 u_SunPos; uniform vec2 u_MoonPos; uniform vec3 u_SunColor; uniform vec3 u_MoonColor; uniform float u_SunSize; uniform float u_MoonSize; uniform vec4 u_HorizonPoints; // left, mid-left, mid-right, right uniform float u_NightBlend; // Interpolate horizon curve height based on X coordinate float getHorizonHeight(float x) { if (x < 0.33) { return mix(u_HorizonPoints.x, u_HorizonPoints.y, smoothstep(0.0, 0.33, x)); } else if (x < 0.66) { return mix(u_HorizonPoints.y, u_HorizonPoints.z, smoothstep(0.33, 0.66, x)); } else { return mix(u_HorizonPoints.z, u_HorizonPoints.w, smoothstep(0.66, 1.0, x)); } } void main() { vec2 uv = v_TexCoord; // Sky base colors based on daylight time vec3 nightColor = vec3(0.01, 0.02, 0.05); vec3 sunriseColor = vec3(0.88, 0.43, 0.28); vec3 noonColor = vec3(0.22, 0.52, 0.90); vec3 sunsetColor = vec3(0.84, 0.27, 0.29); vec3 skyColor = nightColor; if (u_TimeOfDay >= 5.0 && u_TimeOfDay < 7.0) { float t = (u_TimeOfDay - 5.0) / 2.0; skyColor = mix(mix(nightColor, vec3(0.17, 0.20, 0.31), uv.y), mix(nightColor, sunriseColor, uv.y), t); } else if (u_TimeOfDay >= 7.0 && u_TimeOfDay < 11.0) { float t = (u_TimeOfDay - 7.0) / 4.0; skyColor = mix(mix(nightColor, sunriseColor, uv.y), mix(noonColor, vec3(0.55, 0.75, 0.95), uv.y), t); } else if (u_TimeOfDay >= 11.0 && u_TimeOfDay < 15.0) { skyColor = mix(noonColor, vec3(0.55, 0.75, 0.95), uv.y); } else if (u_TimeOfDay >= 15.0 && u_TimeOfDay < 18.0) { float t = (u_TimeOfDay - 15.0) / 3.0; skyColor = mix(mix(noonColor, vec3(0.55, 0.75, 0.95), uv.y), mix(sunsetColor, vec3(0.92, 0.63, 0.50), uv.y), t); } else if (u_TimeOfDay >= 18.0 && u_TimeOfDay < 20.0) { float t = (u_TimeOfDay - 18.0) / 2.0; skyColor = mix(mix(sunsetColor, vec3(0.92, 0.63, 0.50), uv.y), nightColor, t); } else { skyColor = mix(nightColor, vec3(0.02, 0.04, 0.08), uv.y); } // Render stars at night if (u_NightBlend > 0.0) { // simple noise stars float starPattern = fract(sin(dot(uv.xy, vec2(12.9898, 78.233))) * 43758.5453); if (starPattern > 0.992) { float blink = 0.5 + 0.5 * sin(u_Time * 3.0 + starPattern * 10.0); skyColor += vec3(0.9, 0.95, 1.0) * blink * u_NightBlend * (1.0 - uv.y); } } // Render celestial bodies (Sun) float distToSun = distance(uv, u_SunPos); float sunMask = smoothstep(u_SunSize, u_SunSize - 0.015, distToSun); float sunGlow = exp(-distToSun * 12.0) * 0.4; skyColor = mix(skyColor, u_SunColor, sunMask + sunGlow * (1.0 - u_NightBlend)); // Render celestial bodies (Moon) float distToMoon = distance(uv, u_MoonPos); float moonMask = smoothstep(u_MoonSize, u_MoonSize - 0.015, distToMoon); float moonGlow = exp(-distToMoon * 15.0) * 0.2; // moon crescent shape carve float crescentMask = smoothstep(u_MoonSize, u_MoonSize - 0.015, distance(uv - vec2(0.01, 0.005), u_MoonPos)); skyColor = mix(skyColor, u_MoonColor, max(0.0, moonMask - crescentMask) + moonGlow * u_NightBlend); // Render Horizon float horizonHeight = getHorizonHeight(uv.x); float horizonMask = smoothstep(horizonHeight + 0.003, horizonHeight - 0.003, uv.y); vec3 groundColor = mix(vec3(0.02, 0.03, 0.05), vec3(0.05, 0.06, 0.08), uv.y / horizonHeight); skyColor = mix(skyColor, groundColor, horizonMask); gl_FragColor = vec4(skyColor, 1.0); }"
